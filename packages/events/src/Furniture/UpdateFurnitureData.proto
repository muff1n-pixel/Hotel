syntax = "proto3";

import "Furniture/FurnitureFlagsData.proto";

message UpdateFurnitureData {
    optional string id = 1;

    string name = 2;
    string description = 3;

    string category = 4;
    string interaction_type = 5;

    FurnitureFlagsData flags = 6;

    float depth = 7;

    string type = 8;
    optional uint32 color = 9;
    
    string placement = 10;
}

