syntax = "proto3";

import "Shop/Features/Configuration/ShopFeatureConfigurationData.proto";

message UpdateShopFeatureData {
    optional string id = 1;
    string page_id = 8;

    string alignment = 7;

    string title = 2;
    string image = 3;

    optional string featured_page_id = 5;

    optional ShopFeatureConfigurationData configuration = 6;
}
