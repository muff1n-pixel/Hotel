syntax = "proto3";

message RoomWiredMonitorData {
    string room_id = 1;

    message RoomWiredMonitorStatisticsData {
        message RoomWiredMonitorStatisticData {
            string type = 1;
            uint32 value = 2;
            uint32 max_value = 3;
        }

        repeated RoomWiredMonitorStatisticData variables = 1;
        bool heavy = 2;
    }

    RoomWiredMonitorStatisticsData statistics = 2;

    message RoomWiredMonitorLogData {
        string category = 1;
        string level = 2;
        uint32 amount = 3;
        optional string latest_occurrence = 4;
    }

    repeated RoomWiredMonitorLogData logs = 3;
}
