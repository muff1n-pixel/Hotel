message UserFurnitureCustomData {
    message UserFurnitreCustomCommonData {
        WiredCommonDelayData delay = 1;
    }

    UserFurnitreCustomCommonData common = 100;

    oneof data {
        UserFurnitureMoodlightData moodlight = 1;
        UserFurnitureTonerData toner = 2;
        UserFurnitureBackgroundData background = 3;
        UserFurnitureStickyData sticky = 4;
        UserFurnitureTrophyData trophy = 5;

        WiredActionShowMessageData wired_action_show_message = 6;
        WiredActionTeleportToFurnitureData wired_action_teleport_to_furniture = 7;
        WiredActionToggleStateData wired_action_toggle_state = 24;
        WiredActionMoveRotateData wired_action_move_rotate = 25;
        WiredActionMoveRotateUserData wired_action_move_rotate_user = 26;
        WiredActionMatchToPositionStateData wired_action_match_to_position_state = 27;
        WiredActionToggleRandomStateData wired_action_toggle_random_state = 28;
        WiredActionCallStacksData wired_action_call_stacks = 29;
        WiredActionControlClockData wired_action_control_clock = 30;
        WiredActionAdjustClockData wired_action_adjust_clock = 31;

        WiredTriggerPeriodicallyData wired_trigger_periodically = 8;
        WiredTriggerStuffStateData wired_trigger_stuff_state = 9;
        WiredTriggerUserPerformsActionData wired_trigger_user_performs_action = 10;
        WiredTriggerUserSaysSomethingData wired_trigger_user_says_something = 11;
        WiredTriggerClockCounterData wired_trigger_clock_counter = 21;
        WiredTriggerAtSetTimeData wired_trigger_at_set_time = 22;
        WiredTriggerScoreAchievedData wired_trigger_score_achieved = 23;

        WiredFurnitureSelectionData wired_furniture_selection = 12;
        WiredUserSpecifierData wired_user_specifier = 13;

        UserFurnitureTeleportData teleport = 14;
        UserFurnitureCrackableData crackable = 15;

        UserFurnitureGameTimerData game_timer = 16;
        
        UserFurnitureStackHelperData stack_helper = 17;

        UserFurnitureMannequinData mannequin = 18;

        UserFurnitureTraxData trax = 19;
        UserFurnitureTraxSongDiskData trax_song_disk = 20;
    }
}
