syntax = "proto3";

import "User/UserIdentifierData.proto";
import "Bot/BotIdentifierData.proto";
import "Pets/PetIdentifierData.proto";

message RoomActorIdentifierData {
    oneof actor {
        UserIdentifierData user = 1;
        BotIdentifierData bot = 2;
        PetIdentifierData pet = 3;
    }
}
