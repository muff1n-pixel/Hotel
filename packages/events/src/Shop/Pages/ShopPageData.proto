syntax = "proto3";

import "Shop/Features/ShopFeatureData.proto";
import "Shop/Bundles/ShopBundleData.proto";

message ShopPageData {
    string id = 1;
    optional string parent_id = 2;
    
    string category = 3;

    string title = 4;
    optional string description = 5;

    string type = 6;

    optional string icon = 7;
    optional string header = 8;
    optional string teaser = 9;

    uint32 index = 10;

    optional ShopBundleData bundle = 12;
    
    optional ShopFeatureData feature_vertical = 13;
    optional ShopFeatureData feature_horizontal_top = 14;
    optional ShopFeatureData feature_horizontal_middle = 15;
    optional ShopFeatureData feature_horizontal_bottom = 16;
}
