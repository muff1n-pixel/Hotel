syntax = "proto3";

import "Groups/GroupBadgeData.proto";
import "Room/Information/RoomInformationOwnerData.proto";

message GroupData {
    string id = 1;

    string name = 3;
    string description = 4;

    string primary_color = 5;
    string secondary_color = 6;
    
    GroupBadgeData badge = 7;

    string type = 8;

    string created_at = 9;

    uint32 members_count = 10;
    RoomInformationOwnerData owner = 11;
}
