syntax = "proto3";

import "Room/RoomPositionData.proto";
import "Room/Actors/RoomActorIdentifierData.proto";
import "Room/Actors/RoomActorActionData.proto";

message RoomActorPositionData {
    RoomActorIdentifierData actor = 1;
    RoomPositionData position = 2;
    optional int32 direction = 3;
    optional bool use_path = 4;

    optional RoomActorActionData action = 5;
}
