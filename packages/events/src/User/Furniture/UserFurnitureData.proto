syntax = "proto3";

import "Room/RoomPositionData.proto";

import "User/UserNameData.proto";

import "User/Furniture/UserFurnitureAnimationTag.proto";
import "User/Furniture/UserFurnitureCustomData.proto";

message UserFurnitureData {
    string id = 1;
    string user_id = 2;

    string furniture_id = 3;

    RoomPositionData position = 4;
    optional uint32 direction = 5;

    int32 animation = 6;
    repeated UserFurnitureAnimationTag animation_tags = 9;

    optional uint32 color = 7;

    UserFurnitureCustomData data = 8;

    optional UserNameData user = 10;

    optional string name = 11;
    optional string description = 12;
}

