syntax = "proto3";

import "Shop/Features/ShopFeaturePageData.proto";
import "Shop/Features/Configuration/ShopFeatureConfigurationData.proto";

message ShopFeatureData {
    string id = 1;

    string title = 2;
    string image = 3;

    string type = 4;

    ShopFeaturePageData featured_page = 5;

    optional ShopFeatureConfigurationData configuration = 6;
}
