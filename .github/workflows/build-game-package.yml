name: Build game package

on:
  workflow_call:

jobs:
  build-game-package:
    name: Build game package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated events
        uses: actions/download-artifact@v4
        with:
          name: generated-events
          run-id: ${{ github.event.workflow_run.id }}
          path: packages/events/build/
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install events dependencies
        working-directory: packages/events
        run: npm ci

      - name: Download built shared package
        uses: actions/download-artifact@v4
        with:
          name: shared-package
          run-id: ${{ github.event.workflow_run.id }}
          path: packages/shared/build/
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install shared dependencies
        working-directory: packages/shared
        run: npm ci

      - name: Install dependencies
        working-directory: packages/game
        run: npm ci

      - name: Build package
        working-directory: packages/game
        run: npm run build
